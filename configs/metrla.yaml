  is_linear: False
  DEVICE: 'cuda:0'
  num_of_vertices: 207
  seq_len: 72
  seq_hid: 128
  n_hid: 207
  dropout: 0.
  gama: 2


model:
  is_unconditional: 0
  timeemb: 128
  featureemb: 16
  target_strategy: "mix"