
#type: args

train:
  epochs: 4000
  batch_size: 8 
  lr: 1.0e-3
  itr_per_epoch: 1.0e+8
  train_block: False


diffusion:
  layers: 4 
  channels: 32
  diffusion_embedding_dim: 128
  beta_start: 0.0001
  beta_end: 0.3
  num_steps: 50
